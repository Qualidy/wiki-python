<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemondisplayer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Pokemondisplayer</h1>
    <input type="text" id="pokemonName" placeholder="Enter Pokemon Name">
    <button onclick="getPokemon()">Show Picture</button>
    <div id="pokemonDisplay" style="display: none;"> <!-- style so gewählt, damit der grüne rand nur da ist, wenn auch ein bild angezeigt wird !-->
        <img id="pokemonImage" src="" alt="Pokemon Image">
        <p id="pokemonText"></p>
    </div>
    <script>
        async function getPokemon() {
            const name = document.getElementById("pokemonName").value.toLowerCase();
            const translationResponse = await fetch(`/translate/${name}`);
            const translationData = await translationResponse.json();
            
            if (translationData.error) {
                alert(translationData.error);
                return;
            }
            
            const englishName = translationData.english_name;
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${englishName}`);

            if (response.ok) {
                const data = await response.json();
                document.getElementById("pokemonImage").src = data.sprites.front_default;
                document.getElementById("pokemonText").innerText = englishName;
                document.getElementById("pokemonDisplay").style.display = "block";
            } else {
                alert("Pokemon nicht gefunden!");
                document.getElementById("pokemonDisplay").style.display = "none";
            }
        }
    </script>
</body>
</html>
