<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemondisplayer</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h1>Pokemondisplayer</h1>
    <input placeholder="Pikachu" type="text" id="name" required>
    <button id="showPictureButton">Show Picture</button>
    <img id="pokemonImage" src="" alt="A wild Pokemon picture will appear">
    <script>
        document.getElementById('showPictureButton').addEventListener('click', function() {
            const pokemonName = document.getElementById('name').value.toLowerCase();
            const url = `https://pokeapi.co/api/v2/pokemon/${pokemonName}`;
            
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Pokemon not found');
                    }
                    return response.json();
                })
                .then(data => {
                    const imageUrl = data.sprites.front_default;
                    document.getElementById('pokemonImage').src = imageUrl;
                    document.getElementById('pokemonImage').alt = `Image of ${pokemonName}`;
                })
        });
    </script>
</body>
</html>
