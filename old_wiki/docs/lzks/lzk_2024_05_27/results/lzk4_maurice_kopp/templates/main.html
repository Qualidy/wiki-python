<!DOCTYPE html>
<html>
<head>
    <title>Pokemondisplayer</title>
    <link rel="stylesheet" type="text/css" href="/Users/vwr4v3p/Desktop/lzk4/static/css/style.css">
</head>
<body>
    <h1>Pokemondisplayer</h1>
    <input type="text" id="pokemon" placeholder="Pokemon">
    <button id="button">Show picture</button>
    <div>
    <img id="pokemonPicture" src="">
    </div>
    <script>
        document.getElementById('button').addEventListener('click', function() {
            var pokemon = document.getElementById('pokemon').value.toLowerCase();
            const url = `https://pokeapi.co/api/v2/pokemon/${pokemon}`;

            fetch(url)
            .then(response => response.json())
            .then(data => {
                const pokemonImageUrl = data.sprites.front_default;
                const pokemonPicture = document.getElementById('pokemonPicture');
                pokemonPicture.src = pokemonImageUrl;
            })
            .catch(error => {
                console.error('Kein Pokemon gefunden', error);
            });
        });
    </script>
</body>
</html>
