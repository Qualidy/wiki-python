title: "Jahreszeiten"
difficulty: 2
question: |
  Schreibe ein Programm, das den Namen einer Jahreszeit ausgibt, basierend auf einer Monatsnummer (1 bis 12).
solution: |
  ```python
  if monat in [3, 4, 5]:
      print("Frühling")
  elif monat in [6, 7, 8]:
      print("Sommer")
  elif monat in [9, 10, 11]:
      print("Herbst")
  else:
      print("Winter")
  ```
