title: "Rabattaktion"
difficulty: 2
question: |
  Schreibe ein Programm, das basierend auf dem Einkaufswert unterschiedliche Rabatte berechnet.
solution: |
  if einkaufswert >= 100:
      print("Rabatt: 20%")
  elif einkaufswert >= 50:
      print("Rabatt: 10%")
  else:
      print("Kein Rabatt")
  ```
