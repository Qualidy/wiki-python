title: "mehrere Instanzen erzeugen"
difficulty: 1
question: |
  Erstelle eine leere Klasse `Car` und erzeuge drei verschiedene Instanzen von `Car`.
  Wie kannst du überprüfen, dass die Instanzen wirklich verschieden sind?

solution: |
  class Car:
      pass

  a = Car()
  b = Car()
  c = Car()

  print(id(a))
  print(id(b))
  print(id(c))
