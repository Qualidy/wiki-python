title: "Aufteilen und Herschen"
difficulty: 3
question: |
  Implementieren sie [Mergesort](https://de.wikipedia.org/wiki/Mergesort).
solution: |
  ```python
  def merge_sort(elements):
      if len(elements) <= 1:
          return elements
  
      mitte = len(elements) // 2
      links = merge_sort(elements[:mitte])
      rechts = merge_sort(elements[mitte:])
  
      return merge(links, rechts)
  
  
  def merge(links, rechts):
      ergebnis = []
      i = 0
      j = 0
  
      while i < len(links) and j < len(rechts):
          if links[i] <= rechts[j]:
              ergebnis.append(links[i])
              i += 1
          else:
              ergebnis.append(rechts[j])
              j += 1
  
      ergebnis.extend(links[i:])
      ergebnis.extend(rechts[j:])
      return ergebnis
  
  print(merge_sort([5, 2, 8, 1, 3]))
  ```
