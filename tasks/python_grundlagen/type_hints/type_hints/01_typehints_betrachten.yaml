title: "Typehints betrachten"
difficulty: 1
question: |
  Der folgende Code, kann zwar ausgeführt werden, die Varaiblentypen sind aber nicht korrekt gesetzt.
  Nutze deine IDE, um dich auf die Fehler in der Typisierung hinweisen zu lassen. Installiere
  auch `mypy` und überprüfe den Code damit.

  ```python
  def addiere(a: int, b: int) -> int:
      return a + b

  num1: int = "hiho"
  num2 = "gustav"
  result: int = addiere(num1, num2)
  print(result)
  ```
solution: |
  ```commandline
  something.py:5: error: Incompatible types in assignment (expression has type "str", variable has type "int")  [assignment]
  something.py:7: error: Argument 2 to "addiere" has incompatible type "str"; expected "int"  [arg-type]
  Found 2 errors in 1 file (checked 1 source file)
  ```
