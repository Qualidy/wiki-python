title: Vergleich von Integers
difficulty: 1
question: |
  Was ist das Ergebnis von:

  * `1 < 3`
  * `10 > 11`
  * `22 != 23`
  * `567 <= 890`
  * `444 >= 444`
  * `42 =< 42`
solution: |
  ```python
  print(1 < 3)       # True
  print(10 > 11)     # False
  print(22 != 23)    # True
  print(567 <= 890)  # True
  print(444 >= 444)  # True
  print(42 =< 42)    # SyntaxError
  ```
