title: "Elementweise Multiplikation"
difficulty: 2
question: |
  Nimm zwei Listen von Ganzzahlen und multipliziere sie elementweise mithilfe von `zip`.

  ```python
  liste1 = [1, 2, 3, 4]
  liste2 = [5, 6, 7, 8]

  result = [5, 12, 21, 36]
  ```
solution: |
  ```python
  [x * y for x, y in zip(liste1, liste2)]
  ```
